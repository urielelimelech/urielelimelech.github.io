",\"820\",\"static/chunks/app/residency/%5Bdeck%5D/%5Bcard%5D/page-56a680fa2cc6ccb6.js\"],\"\"]\n12:I[30,[\"400\",\"static/chunks/400-a017da0691df664d.js\",\"979\",\"static/chunks/979-82900d818bb139e5.js\",\"820\",\"static/chunks/app/residency/%5Bdeck%5D/%5Bcard%5D/page-56a680fa2cc6ccb6.js\"],\"SwipeNav\"]\n13:I[7112,[\"400\",\"static/chunks/400-a017da0691df664d.js\",\"979\",\"static/chunks/979-82900d818bb139e5.js\",\"820\",\"static/chunks/app/residency/%5Bdeck%5D/%5Bcard%5D/page-56a680fa2cc6ccb6.js\"],\"FlipCard\"]\n14:T134c,"])</script><script>self.__next_f.push([1,"CFI = Cultural Formulation Interview של DSM-5.\nמבנה: **16 שאלות ליבה + 12 מודולים** משלימים (לפי אוכלוסייה ואזור־עניין).\n\nארבעת הצירים העיקריים של ה-CFI:\n1. הגדרת הבעיה התרבותית.\n2. תפיסות של סיבה, הקשר ותמיכה.\n3. גורמי השפעה תרבותיים על coping ועל פנייה לעזרה.\n4. גורמי השפעה תרבותיים על מערכת היחסים הטיפולית.\n\nבישראל ה-CFI אינו \"תוספת\" אלא חובה מעשית: רב־תרבותיות (ערבי-יהודי, חילוני-דתי, ותיק-עולה, אתיופי-רוסי) משפיעה ישירות על הצגה, אבחנה ועמדה כלפי טיפול.\n\n**דוגמאות verbatim (עברית) — מטופל חרדי / דתי:**\n- *\"מתבגר בן 16 בן למשפחה חרדית מזרם החסידי, תלמיד ישיבה קטנה ב__ , בכור לתשעה אחים.\"* (לא \"מהמגזר\", לא \"אוכלוסייה סגורה\" — שם הזרם משמעותי)\n- *\"במסגרת ההערכה נלקחה בחשבון העובדה שהפנייה לפסיכיאטר נעשתה לאחר התייעצות עם רב המשפחה, וכי כל החלטה טיפולית — ובמיוחד נטילת תרופות פסיכואקטיביות — דורשת בירור הלכתי משלים.\"*\n- *\"הוסברה למטופל ולהוריו חשיבותו של הסודיות הרפואית, וכן זכותם לבחור את היקף השיתוף עם דמויות מערכתיות (רב, ראש ישיבה, מורה דרך).\"*\n- *\"ההפניה תהיה למטפלת בת מינו של המטופל ככל הניתן, בהתאם לבקשת המשפחה ולנורמות התרבותיות.\"*\n\n**דוגמאות verbatim (עברית) — מטופל ערבי / דובר ערבית:**\n- *\"הראיון התקיים בשפה הערבית, השפה הראשונה של המטופל. במידה ואין דובר ערבית בצוות — נעשה שימוש במתורגמן מקצועי, ולא בבן משפחה, על מנת לאפשר חופש הבעה ולהימנע מקונפליקטים תוך־משפחתיים בשיח על נושאים רגישים.\"*\n- *\"מטופל בן __ , בן לקהילה הערבית הנוצרית/המוסלמית/הדרוזית, תושב __ . מבנה משפחתי מורחב הכולל אינטראקציה יום־יומית עם החמולה.\"*\n- *\"בנוסף למשפחה הגרעינית, ההחלטות הקשורות לטיפול נפשי מערבות את ראש החמולה (ה'מח'תאר' / 'ראס אל־עיילה'), ויש לשלבו בנקודות מפנה משמעותיות, בהסכמת המטופל.\"*\n- *\"הוסבר למטופל ולמשפחתו שאבחנה פסיכיאטרית אינה נחלתם הבלעדית של 'מג'נון' (משוגע); הניסוחים מותאמים לאוצר המילים הקליני בערבית מודרנית.\"*\n\n**דוגמאות verbatim (עברית) — יוצאי אתיופיה ויוצאי ברה\"מ:**\n- אתיופיה: *\"מטופל בן __ , יוצא קהילת ביתא ישראל, עלה לארץ ב-__ במסגרת מבצע __ . במסגרת ההערכה לקחנו בחשבון מודלים מסורתיים של מצוקה נפשית, כולל מושג ה'ז'אר' (אחיזה רוחנית) ותפקיד ה'קייס' (מנהיג רוחני).\"*\n- אתיופיה — שפה: *\"בשיחה עם הסבתא נדרש מתורגמן לאמהרית/תיגרינית. ההורים — דור 1.5 — דוברי עברית רהוטה, אך במצוקה נוטים לחזור לשפת המקור.\"*\n- ברה\"מ — סטיגמה: *\"בתרבות המקור — סטיגמה משמעותית כלפי פסיכיאטריה כתוצאה מהיסטוריה של 'פסיכיאטריה מענישה' בברה\"מ; פניה למטפל לעיתים מתפרשת כסימן חולשה אישית.\"*\n- ברה\"מ — סומטיזציה: *\"יש להיזהר מאבחון יתר — פציינטים רוסים נוטים להציג את הסבל בשפה גופנית (סומטיזציה: 'דיכאון בלב', 'עצבים'), ולא תמיד במונחים פסיכיאטריים מודרניים.\"*\n\nהכלל: הימנעו ממונחי \"פתיחות\" / \"סגירות\" — שופטים. הקשבה למודל ההסבר של המטופל (Kleinman's explanatory model) — לא התעקשות על מודל DSM קשיח. הימנעו מסטריאוטיפים: לא להניח דכאון \"בשל המסגרת הסגורה\", לא להניח OCD בגלל \"טקסי דת\". האוכלוסייה הערבית בישראל הטרוגנית; אין להניח אוטומטית PTSD על בסיס הגירה.\n\n*Lewis-Fernández et al., DSM-5 Handbook on the CFI, APA 2016; Kleinman, Patients \u0026 Healers 1980; ספיר־אסיא; אגוד הפסיכיאטריה בישראל*"])</script><script>self.__next_f.push([1,"4:[\"$\",\"$L10\",null,{\"children\":[[\"$\",\"div\",null,{\"className\":\"flex items-center justify-between mb-3 text-sm\",\"children\":[[\"$\",\"$L11\",null,{\"href\":\"/?tab=residency\",\"className\":\"opacity-70\",\"children\":\"← בלוקים\"}],[\"$\",\"span\",null,{\"className\":\"opacity-60\",\"children\":[42,\" / \",42]}]]}],[\"$\",\"$L12\",null,{\"prevHref\":\"/residency/RS-summa
